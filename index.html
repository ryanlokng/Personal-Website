    <div id="root"></div>
    <script>
      // Undo the redirect encoding from 404.html (see that file for why this exists)
      // before React Router reads the URL.
      (function () {
        var params = new URLSearchParams(location.search);
        var redirect = params.get('redirect');
        if (redirect) {
          history.replaceState(null, '', redirect);
        }
      })();
    </script>
